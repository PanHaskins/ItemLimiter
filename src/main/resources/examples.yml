example_item:
  limit: # global > player
    in_inventory: 1 # how many items could be in inventory
    sources:
      per_player: 1 # -1 for unlimited
      global: 1 # -1 for unlimited
  cooldown:
    time: 10 # in seconds
    trigger:
      - DAMAGE # hit mobs/animals/players
      - CONSUME # When player ate the item
      - THROW # throw projectile (e.g. snowball, egg, ender pearl, trident, splash potion)
      - BLOCK_BREAK # break block with item (e.g. pickaxe, shovel, axe, hoe)
      - INTERACT # interact with entity (e.g. shearing, stripping, unoxidizing, waxing, get honeycomb from beehive/bee_nest)
  blacklist_sources:
    - CRAFTING # Contains Crafting Table, Crafter
    - FURNACE # Contains Furnace, Blast Furnace, Smoker
    - SMITHING # Smithing Table
    - BARTERING # Trade with piglins
    - TRADING # Trade with villagers and wandering traders
    - TREASURE # Loot chests, dungeons, etc.
    - MOB_DROPS # Drops from mobs, animals
    - BLOCK_DROPS # Drops from all of blocks
    - FISHING # Catch fish with fishing rod
    - SHEARING # Shearing sheep, mooshroom, snow golem, bogged (player or dispenser)
  worlds: # if empty, then all worlds are allowed
    blacklist: true # make list of whitelisted worlds or blacklisted worlds
    list:
      - "example_world"

# ========================= POTIONS =========================
# Format: <POTION_TYPE>_POTION
# Use the Minecraft potion type name (NOT the effect name).
# Applies to ALL variants: normal, splash, and lingering potions.
#
# One entry covers ALL variants (normal, splash, lingering, long, strong).
#
# Available potion names:
#   STRENGTH_POTION, SWIFTNESS_POTION, LEAPING_POTION,
#   REGENERATION_POTION, POISON_POTION, HEALING_POTION,
#   HARMING_POTION, FIRE_RESISTANCE_POTION,
#   WATER_BREATHING_POTION, INVISIBILITY_POTION,
#   NIGHT_VISION_POTION, SLOWNESS_POTION, WEAKNESS_POTION,
#   TURTLE_MASTER_POTION, SLOW_FALLING_POTION,
#   WIND_CHARGED_POTION, WEAVING_POTION, OOZING_POTION,
#   INFESTED_POTION
#
# Example: "STRENGTH_POTION" covers Strength I, II, long, splash, lingering
# ============================================================

# NOTE: BREWING and BARTERING don't support per_player (no player context).
#       Use 'global' for these. All other sources support both per_player and global.

STRENGTH_POTION:
  max_level: 2 # max potion amplifier level allowed (0 = effect fully banned)
  max_duration: 300 # max duration in seconds (0 or absent = no limit)
  limit: # global > player
    in_inventory: 3 # how many potions could be in inventory (normal + splash + lingering combined)
    sources:
      per_player: -1 # not used for BREWING/TREASURE/MOB_DROPS/BARTERING
      global: 10 # max 10 on the whole server
  cooldown:
    time: 5 # in seconds
    trigger:
      - CONSUME # When player drank the potion
      - THROW # throw potion (e.g. splash potion, lingering potion)
  blacklist_sources:
    - BREWING # Brewing Stand
    - TREASURE # Loot chests, dungeons, etc.
    - MOB_DROPS
    - BARTERING # Trade with piglins


# ======================== ENCHANTMENTS ========================
# Format: <ENCHANTMENT_NAME>_ENCHANT
# Use the Minecraft enchantment key name.
# This restricts enchanted books with this enchantment.
#
# Common enchantment names:
#   SHARPNESS_ENCHANT, SMITE_ENCHANT, PROTECTION_ENCHANT,
#   EFFICIENCY_ENCHANT, FORTUNE_ENCHANT, MENDING_ENCHANT,
#   UNBREAKING_ENCHANT, SILK_TOUCH_ENCHANT, LOOTING_ENCHANT,
#   FIRE_ASPECT_ENCHANT, KNOCKBACK_ENCHANT, THORNS_ENCHANT,
#   SWEEPING_EDGE_ENCHANT, BREACH_ENCHANT, DENSITY_ENCHANT,
#   WIND_BURST_ENCHANT
# ==============================================================

SHARPNESS_ENCHANT:
  max_level: 1 # max enchantment level allowed (0 = fully banned)
  limit: # global > player
    in_inventory: 1 # how many enchanted books could be in inventory
  blacklist_sources:
    - ENCHANTING # Enchanting Table
    - ANVIL # Repair, add enchant, upgrade in Anvil
    - TREASURE # Loot chests, dungeons, etc.
    - FISHING # Catch fish with fishing rod
    - BARTERING # Trade with piglins
    - TRADING # Trade with villagers and wandering traders

example_block:
  cooldown:
    time: 10 # in seconds
    trigger:
      - BLOCK_PLACE # place block in world
      - INTERACT # player interact with these block (e.g. crafting table, furnace, anvil, enchanting table, brewing stand, smithing table, cartography table, stonecutter, loom, grindstone)
  limit: # global > player
    in_inventory: 64 # how many items could be in inventory
  blacklist_sources:
    - CRAFTING # Contains Crafting Table, Crafter
    - BLOCK_DROPS # Drops from all of blocks
    - TREASURE # Loot chests, dungeons, etc.

example_sword:
  limit: # global > player
      in_inventory: 1 # how many items could be in inventory
      sources:
        per_player: 1 # -1 for unlimited
        global: -1 # -1 for unlimited
  cooldown:
      time: 2 # in seconds
      trigger:
        - DAMAGE # hit mobs/animals/players
  blacklist_sources:
    - CRAFTING # Contains Crafting Table, Crafter
    - TREASURE # Loot chests, dungeons, etc.

example_axe:
  cooldown:
    time: 1 # in seconds
    trigger:
      - DAMAGE
      - INTERACT
      - BLOCK_BREAK
  blacklist_sources:
    - CRAFTING
