database:
  type: "sqlite"
  mysql:
    host: "localhost:3306"
    username: "username"
    password: "password"
    database: "item_limiter"
  sqlite:
    file: "database.db"

placeholders:
  unknown_player: "Someone"

# Available placeholders for source notifications:
#   %player%       - Player name or unknown_player (see above) when no player is known
#   %item%         - Item key from items.yml
#   %source_name%  - Localized source name (see sources section below)
#   %left_sources% - Remaining allowed acquisitions (∞ if no global limit)
#   %x%, %y%, %z%  - Coordinates of the player or block source
notification:
  sources:
    "10": "<yellow>%left_sources% items left for %item%."
    "5": "<yellow>%left_sources% items left for %item%."
    "1": "<yellow>%left_sources% item left for %item%."
    always: "<gray><hover:show_text:'X: %x% Y: %y% Z: %z%'>%player%</hover> get %item% from %source_name%."

sources:
  crafting: "Crafting"
  furnace: "Furnace"
  enchanting: "Enchanting"
  smithing: "Smithing"
  block_drops: "Block drops"
  mob_drops: "Mob drops"
  treasure: "Treasure"
  bartering: "Bartering"
  trading: "Trading"
  brewing: "Brewing"
  anvil: "Anvil"
  fishing: "Fishing"
  shearing: "Shearing"
